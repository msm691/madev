version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: madev_db
    restart: always
    environment:
      POSTGRES_USER: madev_user
      POSTGRES_PASSWORD: madev_password
      POSTGRES_DB: madev_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: madev_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://madev_user:madev_password@db:5432/madev_db?schema=public
      - NEXTAUTH_SECRET=super_secret_local_test_key_123!
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - db

volumes:
  db_data:
